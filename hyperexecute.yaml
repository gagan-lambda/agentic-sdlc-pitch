---
version: "0.1"
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: linux

autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 5

env:
  BUILD: "Agentic SDLC | KaneAI Export"
  # testmuai env — enables AI visual assertions via kaneai-api.lambdatest.com
  TESTMU_SMART: "1"
  TESTMU_RUN_TARGET: "cloud"
  TESTMU_AI_API_HOST: "https://kaneai-api.lambdatest.com/v16-server"
  AUTOMIND_URL: "https://kaneai-api.lambdatest.com"
  TESTMUAI_ENV: "prod"
  TESTMUAI_SOURCE: "hyperexecute"
  HYE_HUB: "hub.lambdatest.com"
  KANE_V3: "true"
  PYTHONUNBUFFERED: "1"
  # TESTMUAI_BASIC_AUTH injected at runtime by flow1_pipeline.py

runtime:
  - language: python
    version: "3.11"
  - language: node
    version: "18"

cacheKey: '{{ checksum "requirements-he.txt" }}'
cacheDirectories:
  - CacheDir

pre:
  - pip3 install -r requirements-he.txt --cache-dir CacheDir
  - pip3 install testmuai-playwright-bindings --cache-dir CacheDir
  - npm install @testmuai/playwright-bindings
  - playwright install chromium

testDiscovery:
  type: raw
  mode: dynamic
  command: find tests/playwright/kane -name "test.py" | sort | sed 's|^|python |'

testRunnerCommand: $test

mergeArtifacts: true
uploadArtefacts:
  - name: TestReports
    path:
      - reports/

post:
  - echo "HyperExecute Agentic SDLC — KaneAI Export run complete"

jobLabel:
  - agentic-sdlc
  - lambdatest-pitch
  - kaneai
  - python
  - playwright
